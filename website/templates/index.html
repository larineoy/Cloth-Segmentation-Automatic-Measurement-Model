<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cloth Measurement</title>
  <style>
    body { font-family: sans-serif; background: #111; color: white; text-align: center; padding: 2rem; }
    img { max-width: 640px; width: 100%; border: 2px solid #444; border-radius: 8px; }
    button {
      margin-top: 1rem; padding: 0.75rem 2rem;
      font-size: 1rem; background: #e63946; color: white;
      border: none; border-radius: 6px; cursor: pointer;
    }
    button:hover { background: #c1121f; }
    #captured { margin-top: 2rem; display: none; }
    h2 { color: #aaa; font-size: 1rem; text-transform: uppercase; letter-spacing: 2px; }
  </style>
</head>
<body>

  <h1>👕 Cloth Measurement System</h1>

  <h2>Live Camera Feed</h2>
  <img src="/stream" alt="Live Feed" />

  <br>
  <button onclick="capture()">📸 Capture Photo</button>

  <div id="captured">
    <h2>Captured Photo</h2>
    <img id="captured-img" src="" alt="Captured" />
  </div>

  <script>
    async function capture() {
      const resp = await fetch('/capture', { method: 'POST' });
      const data = await resp.json();
      if (data.status === 'ok') {
        const img = document.getElementById('captured-img');
        img.src = data.photo_url + '?t=' + Date.now(); // bust cache
        document.getElementById('captured').style.display = 'block';
      } else {
        alert('Capture failed!');
      }
    }
  </script>

</body>
</html>
